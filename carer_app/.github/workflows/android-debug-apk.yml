name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'carer_app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-levels: '33'
        build-tools: '33.0.2'

    - name: Verify Gradle Wrapper Files
      working-directory: ./carer_app
      run: |
        test -f gradlew || (echo "Missing file: carer_app/gradlew" && exit 1)
        test -f gradle/wrapper/gradle-wrapper.jar || (echo "Missing file: carer_app/gradle/wrapper/gradle-wrapper.jar" && ls -la gradle/wrapper && exit 1)

    - name: Build APK
      working-directory: ./carer_app
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: carer-app-debug
        path: carer_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
