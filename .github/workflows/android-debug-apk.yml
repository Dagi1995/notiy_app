name: Android Debug APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-carer:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-levels: '33'
        build-tools: '33.0.2'

    - name: Build Carer App APK
      working-directory: ./carer_app
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Carer APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: carer-app-debug-apk
        path: carer_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  build-controller:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-levels: '33'
        build-tools: '33.0.2'

    - name: Build Controller App APK
      working-directory: ./controller_app
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Controller APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: controller-app-debug-apk
        path: controller_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
