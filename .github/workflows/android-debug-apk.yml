name: Android Debug APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-carer:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Create local.properties (Carer)
      run: echo "sdk.dir=$ANDROID_HOME" > ./carer_app/local.properties

    - name: Build Carer App APK
      working-directory: ./carer_app
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Carer APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: carer-app-debug-apk
        path: carer_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  build-controller:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Create local.properties (Controller)
      run: echo "sdk.dir=$ANDROID_HOME" > ./controller_app/local.properties

    - name: Build Controller App APK
      working-directory: ./controller_app
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Controller APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: controller-app-debug-apk
        path: controller_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
