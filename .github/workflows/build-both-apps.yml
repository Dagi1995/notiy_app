name: Build Both Apps

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'carer_app/**'
      - 'controller_app/**'
      - '.github/workflows/build-both-apps.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-levels: '33'
        build-tools: '33.0.2'

    - name: Build Carer App APK
      working-directory: ./carer_app
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Build Controller App APK
      working-directory: ./controller_app
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Carer App Artifact
      uses: actions/upload-artifact@v3
      with:
        name: carer-app-debug
        path: carer_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Controller App Artifact
      uses: actions/upload-artifact@v3
      with:
        name: controller-app-debug
        path: controller_app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create Release Summary
      run: |
        echo "✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## APKs Ready" >> $GITHUB_STEP_SUMMARY
        echo "- **Carer App**: carer-app-debug" >> $GITHUB_STEP_SUMMARY
        echo "- **Controller App**: controller-app-debug" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download from Artifacts tab" >> $GITHUB_STEP_SUMMARY
